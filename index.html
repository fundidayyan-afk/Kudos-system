<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kudos — Datacom</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <h1>👏 Kudos</h1>
      <nav id="nav" class="nav hidden">
        <span id="welcomeMsg"></span>
        <a href="admin.html" id="adminLink" class="hidden">Admin</a>
        <button id="logoutBtn" class="btn-link">Log out</button>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Login view -->
    <section id="loginView" class="card login-card">
      <h2>Log in</h2>
      <p class="hint">Demo accounts: alice@datacom.test / Password123! (user) &middot; admin@datacom.test / AdminPass123! (admin)</p>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />

        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />

        <button type="submit" class="btn-primary">Log in</button>
        <p id="loginError" class="error hidden"></p>
      </form>
    </section>

    <!-- Dashboard view -->
    <section id="dashboardView" class="hidden">
      <div class="grid">
        <div class="card">
          <h2>Give Kudos</h2>
          <form id="kudosForm">
            <label for="recipient">Colleague</label>
            <select id="recipient" required></select>

            <label for="message">Message <span id="charCount" class="hint">(0/500)</span></label>
            <textarea id="message" maxlength="500" rows="4" required placeholder="Share why you're recognizing them..."></textarea>

            <button type="submit" class="btn-primary">Send Kudos</button>
            <p id="kudosError" class="error hidden"></p>
            <p id="kudosSuccess" class="success hidden"></p>
          </form>
        </div>

        <div class="card feed-card">
          <h2>Recent Kudos</h2>
          <div id="feed" class="feed"></div>
          <button id="loadMoreBtn" class="btn-secondary hidden">Load more</button>
          <p id="feedEmpty" class="hint hidden">No kudos yet — be the first to send one!</p>
        </div>
      </div>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
